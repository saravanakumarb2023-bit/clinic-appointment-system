apiVersion: apps/v1
kind: Deployment
metadata:
  name: clinic-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clinic-app
  template:
    metadata:
      labels:
        app: clinic-app
    spec:
      containers:
        - name: clinic-app
          image: sar0234/clinic-app:latest
          imagePullPolicy: Always

          # 🔥 IMPORTANT (keeps container alive)
          stdin: true
          tty: true

          # Optional (if you later convert to API)
          ports:
            - containerPort: 8080